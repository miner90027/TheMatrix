#######################################
###          Recipe Viewer          ###
#######################################

[flavor_groups.viewer]
description = "Recipe viewer mod to use. EMI (with the TMRV compat layer) is more performant, more customizable and has more features, and allows faster load times by loading data on world load. JEI has more commonly used direct compatability instead of requiring a universal compat layer mod."
name = "Recipe Viewer"
side = "both"

[[flavor_groups.viewer.choices]]
id = "viewer_emi"
name = "EMI+TMRV"
description = "Installs EMI and TMRV."

[[flavor_groups.viewer.choices]]
id = "viewer_jei"
name = "JEI"
description = "Installs JEI."

[[flavor_groups.viewer.choices]]
id = "viewer_none"
name = "None"
description = "Does not install any recipe viewer. Why would you do this? You will know nothing, John Snow."

[metafile.emi]
flavors = "viewer_emi"
[metafile.tmrv]
flavors = "viewer_emi"
[metafile.jei]
flavors = "viewer_jei"

#######################################
###        Mini & Wolrd Maps        ###
#######################################

[flavor_groups.map]
name = "Mini-map and World Map Mods"
description = "Adds a mini-map &amp; worldmap with waypoints. Usefull for exploring and marking areas of interest. Especially good for marking your base and others to find your way around."
side = "both"

[[flavor_groups.map.choices]]
id = "journeymap"
name = "Journey Map"
description = "Installs Journeymap."

[[flavor_groups.map.choices]]
id = "xaero"
name = "Xaero"
description = "Installs Xaero's Mini &amp; World maps."

[[flavor_groups.map.choices]]
id = "noMap"
name = "None"
description = "Does not install any mini-map or worldmap mods."

[metafile.journeymap]
flavors = "journeymap"
[metafile.journeymap-waypoint-syncing]
flavors = "journeymap"

[metafile.xaeros-minimap]
flavors = "xaero"
[metafile.xaeros-world-map]
flavors = "xaero"
[metafile.xaero-train-map]
flavors = "xaero"

#######################################
###        Particle Effects         ###
#######################################

[flavor_groups.particles]
name = "Particle Enhancements"
description = "Overhauls the particle effects and makes things feel more immersive."
side = "client"

[[flavor_groups.particles.choices]]
id = "particles_fancy"
name = "Fancy"
description = "Install all particle enhancing mods. Makes things look very bonita. Can increase lag on lower-end devices. Especially when breaking or placing large amounts of blocks."

[[flavor_groups.particles.choices]]
id = "particles_reduced"
name = "Vanilla+"
description = "Reduces the particles from weather events, adds wakes &amp; splashes, &amp; gives explosions a cleaner look."

[[flavor_groups.particles.choices]]
id = "vanilla_particles"
name = "Vanilla"
description = "Install none of the particle enhancements &amp; keep particles vanilla."

[metafile.particle-core]
flavors = "particles_fancy"
[metafile.particle-effects]
flavors = "particles_fancy"
[metafile.particle-rain]
flavors = "particles_fancy"
[metafile.particle-interactions]
flavors = "particles_fancy"

[metafile.wakes-reforged]
flavors = ["particles_fancy", "particles_reduced"]
[metafile.explosive-enhancement-neoforge]
flavors = ["particles_fancy", "particles_reduced"]

[metafile.simple-weather]
flavors = "particles_reduced"

#######################################
###       Sound Enhancements        ###
#######################################

[flavor_groups.sounds]
name = "Sound Enhancements"
description = "Installs the Sound Phyisics, Presence Footsteps, and Cool Rain mods. Combined, these mods overhaul how the game handles sounds. They add some new sounds and make existing ones sound even better."

[[flavor_groups.sounds.choices]]
id = "sounds_on"
name = "yes"
[[flavor_groups.sounds.choices]]
id = "sounds_off"
name = "no"

[metafile.sound-physics-remastered]
flavors = "sounds_on"
[metafile.presence-footsteps-neoforge]
flavors = "sounds_on"
[metafile.cool-rain-reforged]
flavors = "sounds_on"
[metafile.presence-footsteps-x-sable]
flavors = "sounds_on"
